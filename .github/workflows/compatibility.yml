name: Packed Package Compatibility

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "e2e/fixtures/packed-expo/**"
      - "e2e-web/packed-package.spec.ts"
      - "playwright.config.ts"
      - "scripts/test-packed-expo-consumer.sh"
      - "package.json"
      - "yarn.lock"
      - "tsconfig.build.json"
      - ".github/workflows/compatibility.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  packed-expo-consumer:
    name: Expo SDK ${{ matrix.expo-sdk }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        expo-sdk: [54, 55, 56, 57]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Expo Android NDK
        run: '"$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.1.12297006"'

      - name: Install repository dependencies
        run: yarn install --frozen-lockfile

      - name: Validate packed package in a clean Expo consumer
        env:
          PACKED_EXPO_WORK_ROOT: ${{ runner.temp }}/packed-expo-consumer
        run: bash scripts/test-packed-expo-consumer.sh "${{ matrix.expo-sdk }}"

      - name: Install Playwright Chromium
        if: matrix.expo-sdk == 54
        run: yarn playwright install chromium

      - name: Validate packed package on web
        if: matrix.expo-sdk == 54
        env:
          PACKED_EXPO_CONSUMER_DIR: ${{ runner.temp }}/packed-expo-consumer/sdk-54
        run: yarn web:packed-smoke

  compatibility-gate:
    name: Compatibility Gate
    if: always()
    needs: packed-expo-consumer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require every Expo compatibility job
        env:
          COMPATIBILITY_RESULT: ${{ needs.packed-expo-consumer.result }}
        run: test "$COMPATIBILITY_RESULT" = "success"
