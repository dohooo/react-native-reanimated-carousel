appId: ${APP_ID}
name: Responsive Auto Size
---

- stopApp
- launchApp:
    clearState: false

- tapOn:
    text: "http://localhost:8081"
    optional: true

- tapOn:
    text: "http://10.0.2.2:8081"
    optional: true

- extendedWaitUntil:
    visible: "Continue"
    timeout: 30000
    optional: true

- tapOn:
    text: "Continue"
    optional: true

- tapOn:
    text: "Close"
    optional: true

- extendedWaitUntil:
    visible: "Basic Layouts"
    timeout: 180000

- openLink: "rnrc-example-app://demos/e2e-testing/web-release-smoke"

- extendedWaitUntil:
    visible: "Web Release Smoke"
    timeout: 180000

- extendedWaitUntil:
    visible: "Horizontal Item Width: 320"
    timeout: 30000

- tapOn:
    id: "horizontal-next"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Horizontal Index: 1"
- assertVisible: "Horizontal Slide 1"

- tapOn:
    id: "horizontal-resize"
- extendedWaitUntil:
    visible: "Horizontal Item Width: 520"
    timeout: 30000
- assertVisible: "Horizontal Index: 1"

- tapOn:
    id: "horizontal-next"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Horizontal Index: 0"
- assertVisible: "Horizontal Slide 0"

- scrollUntilVisible:
    element: "Vertical Item Height: 240"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "vertical-next"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Vertical Index: 1"
- assertVisible: "Vertical Slide 1"

- tapOn:
    id: "vertical-resize"
- scrollUntilVisible:
    element: "Vertical Item Height: 420"
    direction: DOWN
    timeout: 30000
- assertVisible: "Vertical Index: 1"

- tapOn:
    id: "vertical-next"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Vertical Index: 0"
- assertVisible: "Vertical Slide 0"
