appId: ${APP_ID}
---

# Restore the app first. Expo Dev Client normally remembers the Metro server,
# so avoid opening the same deep link again when the home screen is already
# available.
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 5000

# Reconnect only when the saved Dev Client session did not restore the app.
- runFlow:
    when:
      notVisible: "Basic Layouts"
    commands:
      - openLink: "exp+app://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081"

# Wait for the app to fully load.
- waitForAnimationToEnd:
    timeout: 5000

# Android emulators can show a transient ANR dialog.
- tapOn:
    text: "Wait"
    optional: true

# Expo Dev Client may open on Development Servers first.
- tapOn:
    text: "http://localhost:8081"
    optional: true

- tapOn:
    text: "http://10.0.2.2:8081"
    optional: true

- waitForAnimationToEnd:
    timeout: 15000

- tapOn:
    text: "Wait"
    optional: true

# Expo onboarding modal only appears on the first cold launch. Keep the
# probe short so every later flow does not burn the full timeout.
- extendedWaitUntil:
    visible: "Continue"
    timeout: 8000
    optional: true

- tapOn:
    text: "Continue"
    optional: true

- tapOn:
    text: "Close"
    optional: true

# Retry pass for slow transitions / launcher races.
- tapOn:
    text: "http://localhost:8081"
    optional: true

- tapOn:
    text: "http://10.0.2.2:8081"
    optional: true

- tapOn:
    text: "Continue"
    optional: true

- tapOn:
    text: "Close"
    optional: true

# Recover from transient dev-client failures before requiring the home
# screen. A slow CI reload can land on the developer red screen
# ("[runtime not ready]"), whose RELOAD button restarts the bundle.
- repeat:
    times: 3
    while:
      notVisible: "Basic Layouts"
    commands:
      - tapOn:
          text: "RELOAD.*"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - waitForAnimationToEnd:
          timeout: 10000
      - runFlow:
          when:
            notVisible: "Basic Layouts"
          commands:
            - openLink: "exp+app://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081"
      - extendedWaitUntil:
          visible: "Basic Layouts"
          timeout: 45000
          optional: true

# Hard requirement after the bounded recovery attempts.
- extendedWaitUntil:
    visible: "Basic Layouts"
    timeout: 60000

# Android selector path: text is more stable than id for this entry.
- tapOn:
    text: "E2E"
    optional: true

# Wait until the E2E page is ready for interactions.
- extendedWaitUntil:
    visible: "Current Index: 0"
    timeout: 90000

# Reset all settings to default (in case previous flow left modified state).
- scrollUntilVisible:
    element: "Reset All"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "btn-reset"

- waitForAnimationToEnd:
    timeout: 3000

# Scroll back to top to ensure carousel is in viewport.
- swipe:
    start: "50%, 30%"
    end: "50%, 90%"
    duration: 200
- swipe:
    start: "50%, 30%"
    end: "50%, 90%"
    duration: 200
- swipe:
    start: "50%, 30%"
    end: "50%, 90%"
    duration: 200

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible: "Current Index: 0"
