appId: ${APP_ID}
name: Loop Mode - Wrapping Navigation
---

# Navigate to E2E test page.
- runFlow: helpers/navigate-to-e2e.yaml
- assertVisible: "Loop: ON"

# Keep loop semantics coverage deterministic on CI:
# verify wrap-around behavior with the imperative controls.
- tapOn:
    id: "btn-goto-0"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 0"
    timeout: 8000

# Jump to last and verify forward wrap.
- tapOn:
    id: "btn-goto-5"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 5"
    timeout: 8000

- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 0"
    timeout: 8000

# Continuous loop navigation through all slides.
- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 1"
    timeout: 8000

- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 2"
    timeout: 8000

- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 3"
    timeout: 8000

- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 4"
    timeout: 8000

- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 5"
    timeout: 8000

- tapOn:
    id: "btn-next"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Current Index: 0"
    timeout: 8000
