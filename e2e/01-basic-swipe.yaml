appId: ${APP_ID}
name: Basic Swipe Navigation
---

# Navigate to E2E test page
- runFlow: helpers/navigate-to-e2e.yaml
# === Test: Swipe LEFT from 0 to 1 ===
- assertVisible: "Current Index: 0"

- repeat:
    while:
      notVisible: "Current Index: 1"
    times: 3
    commands:
      - tapOn:
          id: "e2e-carousel"
      - swipe:
          start: "85%, 22%"
          end: "15%, 22%"
          duration: 500
      - waitForAnimationToEnd:
          timeout: 3000

- assertVisible: "Current Index: 1"

# === Test: Swipe RIGHT from 1 to 0 ===
- repeat:
    while:
      notVisible: "Current Index: 0"
    times: 3
    commands:
      - tapOn:
          id: "e2e-carousel"
      - swipe:
          start: "15%, 22%"
          end: "85%, 22%"
          duration: 500
      - waitForAnimationToEnd:
          timeout: 3000

- assertVisible: "Current Index: 0"
